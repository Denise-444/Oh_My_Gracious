        <script>

const addServiceBtn = document.getElementById("add-service");
const optionSelect = document.getElementById("option");
const serviceList = document.getElementById("service-list");

addServiceBtn.addEventListener("click", function () {

    const selectedOption =
        optionSelect.options[optionSelect.selectedIndex];

    const serviceText = selectedOption.text;

    const li = document.createElement("li");

    li.textContent = serviceText;

    serviceList.appendChild(li);

});

category.addEventListener("change", function () {
    const selectedCategory = category.value;

    for (let i = 0; i < service.options.length; i++) {
        const opt = service.options[i];
        const match = opt.getAttribute("data-category");

        if (!match || match === selectedCategory) {
            opt.hidden = false;
        } else {
            opt.hidden = true;
        }
    }

    service.selectedIndex = 0;
    service.dispatchEvent(new Event("change"));
});
service.addEventListener("change", function () {
    const selectedService = service.value;

    for (let i = 0; i < option.options.length; i++) {
        const opt = option.options[i];
        const match = opt.getAttribute("data-service");

        if (!match || match === selectedService) {
            opt.hidden = false;
        } else {
            opt.hidden = true;
        }
    }

    option.selectedIndex = 0;
});

</script>
