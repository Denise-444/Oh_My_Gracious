<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h, initial-scale=1.0">
    <title>Document</title>
<style>
    ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    background-color: white;
    overflow: hidden;
    position: fixed;
     top: 0;
    left: 0;
    width: 100%;
    background-image: url(soft-blurred-pink-and-beige-background-photo.jpg);
}
ul li{
    float: right;
    background-color: rgb(248, 191, 233);
}
ul li a{
    display: block;
    color: black;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    margin: 10px;
}   
ul li a:hover{
    background-color: rgb(220, 142, 199);
}
        body{
            background-repeat: no-repeat;
            background-size: cover;
            margin: 0%;
        }
        .container{
            background-color: white;
            
            width: 500px;
            height: 70%;
            margin: auto;
            margin-top: 200px;
            box-shadow: wheat;
            border-radius: 20px;
            padding: 20px;
        }
        input[type="text"],
        input[type="tel"],
        input[type="email"]{
            width: 100%;
            font-size: 18px;
        }
        .open-btn {
    background-color: #ff69b4;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}
.open-btn:hover {
    background-color: #e0559f;
}

/* Modal background */
.modal {
    display: none; /* Hidden by default */
    position: fixed;
    z-index: 1;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5); /* Dark overlay */
}

/* Modal content box */
.modal-content {
    background-color: white;
    margin: 10% auto;
    padding: 20px;
    border-radius: 10px;
    width: 400px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Close button */
.close {
    color: #aaa;
    float: right;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
}
.close:hover {
    color: black;
}

/* Service options */
.service-option {
    display: block;
    margin-bottom: 10px;
    font-size: 18px;
}
input[type="checkbox"] {
    transform: scale(1.3);
    margin-right: 10px;
}
</style>
</head>
<body background="soft-blurred-pink-and-beige-background-photo.jpg">
    <nav class="navbar">
        <ul>
            <li><a href="About.html">About</a></li>
            <li><a href="Contact.html">Contact</a></li>
            <li><a href="booking.html">Book</a></li>
            <li><a href="index.html">Home</a></li>   
        </ul>
        <div class="container">
            <h3>Personal Information</h3>
            <label for="name">Full Name*</label>
            <br>
            <input type="text" id="name" placeholder="Enter Full Name" required>
            <br>
            <br>
            <label for="number">Phone Number*</label>
            <br>
            <input type="tel" id="number" placeholder="09xxxxxxxxx" required>
            <br>
            <br>
            <label for="email">Email Address</label>
            <br>
            <input type="email" id="email" placeholder="your@email.com">
            </div>

            <button class="open-btn" onclick="openModal()">Select Services</button>


    <div id="serviceModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2>Select Services</h2>
    <label class="service-option">
        <input type="checkbox" value="Haircut"> Haircut
    </label>
    <label class="service-option">
        <input type="checkbox" value="Manicure"> Manicure
    </label>
    <label class="service-option">
        <input type="checkbox" value="Massage"> Massage
    </label>
    <label class="service-option">
        <input type="checkbox" value="Facial"> Facial
    </label>
    <br>
    <button class="open-btn" onclick="closeModal()">Done</button>
  </div>
    </div>

<script>
function openModal() {
    document.getElementById("serviceModal").style.display = "block";
}
function closeModal() {
    document.getElementById("serviceModal").style.display = "none";
}

// Close modal if user clicks outside the box
window.onclick = function(event) {
    let modal = document.getElementById("serviceModal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
