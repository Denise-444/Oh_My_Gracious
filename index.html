<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OhMyGracoius</title>
<style>
    body{
        padding-top: 100px;
    }
    ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        align-items: center;
    }
    .navbar{
        background-color: white;
        position: fixed;
        top: 0;
        right: 0;
        width: 100%;
        height: 100px;
        align-items: center;
        display: flex;
        padding: 0 50px;
        box-sizing: border-box;
    }
    ul li{
        padding-left: 10px;
        justify-content: flex-start;
    }
    ul li a{
        display: block;
        color: black;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        margin: 10px;
        font-size: x-large;
        font-family: sans-serif;
    }   
    ul li a:hover{
        background-color:rgb(238, 235, 238);
    }
    .bookbtn{
        color: aliceblue;
        padding: 15px;
        margin: 20px;
        position: fixed;
        top: 500px;
        left: 90px;
        border-radius: 20px;
        font-size: larger;
        background-color: #2C2C2C;
    
    }
    .arbtn{
        color: aliceblue;
        padding: 15px;
        margin: 20px;
        position: fixed;
        top: 430px;
        left: 90px;
        border-radius: 20px;
        font-size: larger;
        background-color: #2C2C2C;
    }
    .auth-buttons {
        display: flex;
        gap: 15px;
        justify-content: flex-end;
        padding: 20px;
    }
    .logo img {
        width: 100px;
        height: auto;
        display: block;
    }
    #loginSection,
    #registerSection {
        margin-top: 120px;
        padding: 20px;
    }
    #loginBtn,
    #registerBtn{
        padding: 10px 18px;
        text-decoration: none;
        color: black;
        font-family: sans-serif;
        font-size: 16px;
        border: 1px solid black;
        border-radius: 6px;
        transition: 0.3s;
        justify-content: space-between;
        text-align: right;
    }
</style>
</head>
<body style="background-color: rgb(194, 172, 187);">
    <nav class="navbar">
        <div class="logo">
            <img src="edited-photo (1).png" alt="OMG LOGO">
        </div>
        <div class="nav-left">
        <ul>
            <li><a href="About.html">About</a></li>
            <li><a href="Contact.html">Contact</a></li>
            <li><a href="booking.html">Book</a></li>
            <li><a href="index.html">Home</a></li>   
        </ul>
        </div>
        <div class="nav-right">
        <a href="#" id="loginBtn">Login</a>
        <a href="#" id="registerBtn">Register</a>
        </div>
    </nav>
    <section id="loginSection" style="display:none;">
        <h2>Login</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
    <button>Login</button>
    </section>

    <section id="registerSection" style="display:none;">
    <h2>Register</h2>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Register</button>
    </section>

    <button></button>
    <a href="booking.html">
        <button class="bookbtn">📅Book Now</button>
    </a>

    <a href="AR.html">
    <button class="arbtn">Try now</button>
    </a>
    <script>
        const loginBtn = document.getElementById("loginBtn");
        const registerBtn = document.getElementById("registerBtn");

        const loginSection = document.getElementById("loginSection");
        const registerSection = document.getElementById("registerSection");

        function hideAll(){
            loginSection.style.display = "none";
            registerSection.style.display = "none";
        }

        loginBtn.addEventListener("click", function (e){
            e.preventDefault();
            hideAll();
            loginSection.style.display = "block";
        })
        registerBtn.addEventListener("click" , function (e){
            e.preventDefault();
            hideAll();
            registerSection.style.display = "block";
        })
    </script>
    
</body>
</html>
